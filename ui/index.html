<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Video to Blog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.45); }
      70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
      100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
    }
    .pulse-ring { animation: pulse-ring 1.2s ease infinite; }

    #blog h1, #blog h2, #blog h3, #blog h4 {
      margin-top: 1.1rem;
      margin-bottom: 0.55rem;
      font-weight: 700;
      line-height: 1.25;
    }
    #blog h1 { font-size: 1.28rem; }
    #blog h2 { font-size: 1.14rem; }
    #blog h3 { font-size: 1.02rem; }
    #blog p {
      margin-top: 0.55rem;
      margin-bottom: 0.55rem;
      line-height: 1.65;
      white-space: pre-wrap;
    }
    #blog ul, #blog ol {
      margin: 0.6rem 0;
      padding-left: 1.2rem;
    }
    #blog li {
      margin: 0.22rem 0;
    }
    #blog pre {
      margin: 0.7rem 0;
      padding: 0.7rem;
      border-radius: 0.5rem;
      background: #0f172a;
      color: #e2e8f0;
      overflow: auto;
      white-space: pre;
    }
    #blog code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.85em;
    }
    #blog blockquote {
      margin: 0.7rem 0;
      padding-left: 0.75rem;
      border-left: 3px solid #cbd5e1;
      color: #475569;
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-900">
  <main class="mx-auto w-[95%] max-w-7xl py-5">
    <div class="grid gap-4 lg:grid-cols-[360px,1fr]">
      <section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
        <h1 class="text-xl font-semibold">Video to Blog</h1>
        <p class="mt-1 text-sm text-slate-500">Local-first pipeline. Leave main model blank to use `MAIN_MODEL`.</p>

        <div class="mt-4 space-y-3">
          <div>
            <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-slate-500" for="source_type">Source Type</label>
            <select id="source_type" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-emerald-600 focus:outline-none">
              <option value="url">url</option>
              <option value="path">path</option>
            </select>
          </div>

          <div>
            <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-slate-500" for="source_value">Source URL / Local Path</label>
            <input id="source_value" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-emerald-600 focus:outline-none" placeholder="https://youtube.com/... or /absolute/video.mp4" />
          </div>

          <div>
            <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-slate-500" for="main_model">Main Model (optional)</label>
            <input id="main_model" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-emerald-600 focus:outline-none" placeholder="blank = MAIN_MODEL env" />
          </div>

          <button id="submit" class="w-full rounded-lg bg-emerald-700 px-3 py-2 text-sm font-semibold text-white transition hover:bg-emerald-800">Create Job</button>
        </div>

        <div class="mt-5 border-t border-slate-200 pt-4">
          <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-slate-500" for="global_search_q">Global Semantic Search</label>
          <div class="flex gap-2">
            <input id="global_search_q" class="min-w-0 flex-1 rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-emerald-600 focus:outline-none" placeholder="Find concepts across jobs" />
            <button id="global_search_btn" class="rounded-lg bg-slate-800 px-3 py-2 text-sm font-medium text-white hover:bg-slate-900">Search</button>
          </div>
          <div id="search_results" class="mt-2 max-h-40 space-y-2 overflow-auto"></div>
        </div>

        <div class="mt-5 border-t border-slate-200 pt-4">
          <h2 class="text-xs font-medium uppercase tracking-wide text-slate-500">Jobs</h2>
          <div id="jobs" class="mt-2 max-h-[42vh] space-y-2 overflow-auto"></div>
        </div>
      </section>

      <section class="space-y-4">
        <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
          <div class="flex flex-wrap items-center gap-2">
            <button id="refresh" class="rounded-lg bg-slate-200 px-3 py-2 text-sm font-medium text-slate-800 hover:bg-slate-300">Refresh</button>
            <button id="retry" class="rounded-lg bg-amber-600 px-3 py-2 text-sm font-medium text-white hover:bg-amber-700">Retry</button>
            <p id="job_meta" class="ml-auto text-sm text-slate-600">No job selected</p>
          </div>

          <div class="mt-4 h-2 overflow-hidden rounded-full bg-slate-200">
            <div id="progress_fill" class="h-full w-0 bg-gradient-to-r from-emerald-500 to-emerald-400 transition-all duration-500"></div>
          </div>

          <div id="stage_list" class="mt-3 grid gap-2 sm:grid-cols-2 xl:grid-cols-3"></div>
        </div>

        <div class="space-y-4">
          <section class="rounded-xl border border-slate-200 bg-white shadow-sm">
            <button id="transcript_toggle" class="flex w-full items-center justify-between px-4 py-3 text-left">
              <span class="text-sm font-semibold uppercase tracking-wide text-slate-500">Transcript</span>
              <span id="transcript_chevron" class="text-slate-500 transition-transform">▾</span>
            </button>
            <div id="transcript_panel" class="border-t border-slate-100 px-4 py-3">
              <div id="transcript" class="max-h-[56vh] overflow-auto"></div>
            </div>
          </section>

          <section class="rounded-xl border border-slate-200 bg-white shadow-sm">
            <button id="blog_toggle" class="flex w-full items-center justify-between px-4 py-3 text-left">
              <span class="text-sm font-semibold uppercase tracking-wide text-slate-500">Markdown</span>
              <span id="blog_chevron" class="text-slate-500 transition-transform">▾</span>
            </button>
            <div id="blog_panel" class="border-t border-slate-100 px-4 py-3">
              <article id="blog" class="prose prose-sm max-w-none"></article>
            </div>
          </section>
        </div>
      </section>
    </div>
  </main>

  <script>
    marked.setOptions({
      gfm: true,
      breaks: true,
    });

    const jobsEl = document.getElementById('jobs');
    const sourceTypeEl = document.getElementById('source_type');
    const sourceValueEl = document.getElementById('source_value');
    const mainModelEl = document.getElementById('main_model');
    const globalSearchQEl = document.getElementById('global_search_q');
    const globalSearchBtnEl = document.getElementById('global_search_btn');
    const searchResultsEl = document.getElementById('search_results');

    const jobMetaEl = document.getElementById('job_meta');
    const transcriptEl = document.getElementById('transcript');
    const blogEl = document.getElementById('blog');
    const transcriptToggleEl = document.getElementById('transcript_toggle');
    const blogToggleEl = document.getElementById('blog_toggle');
    const transcriptPanelEl = document.getElementById('transcript_panel');
    const blogPanelEl = document.getElementById('blog_panel');
    const transcriptChevronEl = document.getElementById('transcript_chevron');
    const blogChevronEl = document.getElementById('blog_chevron');
    const progressFillEl = document.getElementById('progress_fill');
    const stageListEl = document.getElementById('stage_list');

    const STAGES = [
      'download_or_copy_video', 'extract_audio', 'transcribe_audio', 'chunk_transcript',
      'generate_embeddings', 'analyze_chunks', 'create_outline', 'write_draft',
      'refine_markdown', 'optional_translate_markdown', 'mark_complete'
    ];

    const FRIENDLY_STAGE = {
      download_or_copy_video: 'Download/Copy Video',
      extract_audio: 'Extract Audio',
      transcribe_audio: 'Transcribe Audio',
      chunk_transcript: 'Chunk Transcript',
      generate_embeddings: 'Generate Embeddings',
      analyze_chunks: 'Analyze Chunks',
      create_outline: 'Create Outline',
      write_draft: 'Write Draft',
      refine_markdown: 'Refine Markdown',
      optional_translate_markdown: 'Translate Markdown',
      mark_complete: 'Complete',
    };

    let selectedJob = null;
    let previousStageState = {};
    let transcriptOpen = true;
    let blogOpen = true;

    async function api(path, opts = {}) {
      const res = await fetch(path, {
        headers: { 'content-type': 'application/json' },
        ...opts,
      });
      if (!res.ok) throw new Error(await res.text() || `HTTP ${res.status}`);
      return res.json();
    }

    function escapeHTML(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function trimSnippet(text) {
      const clean = String(text || '').replace(/\s+/g, ' ').trim();
      return clean.length > 180 ? `${clean.slice(0, 180)}...` : clean;
    }

    function renderCollapsibles() {
      transcriptPanelEl.classList.toggle('hidden', !transcriptOpen);
      transcriptChevronEl.classList.toggle('rotate-180', !transcriptOpen);
      blogPanelEl.classList.toggle('hidden', !blogOpen);
      blogChevronEl.classList.toggle('rotate-180', !blogOpen);
    }

    function stageStateFor(job, stage, stageIndex, currentIndex) {
      if (job.status === 'complete') return 'done';
      if (job.status === 'failed' && job.current_stage === stage) return 'failed';
      if (job.status === 'running' && job.current_stage === stage) return 'running';
      if (currentIndex >= 0 && stageIndex < currentIndex) return 'done';
      return 'pending';
    }

    function stageBadgeClasses(state) {
      if (state === 'running') return 'border-blue-200 bg-blue-50 text-blue-700';
      if (state === 'done') return 'border-emerald-200 bg-emerald-50 text-emerald-700';
      if (state === 'failed') return 'border-red-200 bg-red-50 text-red-700';
      return 'border-slate-200 bg-slate-50 text-slate-500';
    }

    function dotClasses(state) {
      if (state === 'running') return 'bg-blue-500 pulse-ring';
      if (state === 'done') return 'bg-emerald-500';
      if (state === 'failed') return 'bg-red-500';
      return 'bg-slate-300';
    }

    function renderStages(job) {
      const currentIndex = STAGES.indexOf(job.current_stage || '');
      let doneCount = 0;
      const nextState = {};
      stageListEl.innerHTML = '';

      for (let i = 0; i < STAGES.length; i++) {
        const stage = STAGES[i];
        const state = stageStateFor(job, stage, i, currentIndex);
        if (state === 'done') doneCount++;
        nextState[stage] = state;

        const justDone = previousStageState[stage] !== 'done' && state === 'done';
        const item = document.createElement('div');
        item.className = `rounded-lg border p-2 transition-all duration-300 ${stageBadgeClasses(state)} ${justDone ? 'scale-[1.01]' : ''}`;
        item.innerHTML = `
          <div class="flex items-center gap-2">
            <span class="h-2.5 w-2.5 rounded-full ${dotClasses(state)}"></span>
            <span class="text-xs font-medium tracking-wide">${escapeHTML(FRIENDLY_STAGE[stage] || stage)}</span>
            <span class="ml-auto text-[10px] uppercase tracking-wider">${state}</span>
          </div>
        `;
        stageListEl.appendChild(item);
      }

      previousStageState = nextState;
      let progress = (doneCount / STAGES.length) * 100;
      if (job.status === 'running' && currentIndex >= 0) progress = ((doneCount + 0.5) / STAGES.length) * 100;
      if (job.status === 'complete') progress = 100;
      progressFillEl.style.width = `${Math.max(0, Math.min(100, progress)).toFixed(1)}%`;
    }

    function renderTranscriptReady(rawTranscriptText) {
      transcriptEl.innerHTML = '';

      const wrap = document.createElement('div');
      wrap.className = 'space-y-2';

      let parsed = null;
      try { parsed = JSON.parse(rawTranscriptText); } catch (_) {}

      if (parsed && Array.isArray(parsed.segments)) {
        for (const seg of parsed.segments) {
          const row = document.createElement('div');
          row.className = 'rounded-lg border border-slate-200 bg-slate-50 p-2';
          row.innerHTML = `
            <div class="mb-1 text-[11px] font-semibold uppercase tracking-wide text-slate-500">${Number(seg.start || 0).toFixed(1)}s - ${Number(seg.end || 0).toFixed(1)}s</div>
            <p class="whitespace-pre-wrap text-sm leading-relaxed text-slate-800">${escapeHTML(seg.text || '')}</p>
          `;
          wrap.appendChild(row);
        }
      } else if (Array.isArray(parsed)) {
        for (const chunk of parsed) {
          const row = document.createElement('div');
          row.className = 'rounded-lg border border-slate-200 bg-slate-50 p-2';
          row.innerHTML = `
            <div class="mb-1 text-[11px] font-semibold uppercase tracking-wide text-slate-500">Chunk ${chunk.chunk_index ?? chunk.index ?? '-'}</div>
            <p class="whitespace-pre-wrap text-sm leading-relaxed text-slate-800">${escapeHTML(chunk.content || '')}</p>
          `;
          wrap.appendChild(row);
        }
      } else {
        const pre = document.createElement('pre');
        pre.className = 'whitespace-pre-wrap rounded-lg border border-slate-200 bg-slate-50 p-3 text-xs text-slate-800';
        pre.textContent = rawTranscriptText;
        wrap.appendChild(pre);
      }

      transcriptEl.appendChild(wrap);
    }

    function renderMarkdownReady(markdown) {
      blogEl.innerHTML = marked.parse(markdown || '');
    }

    async function loadJobs() {
      const jobs = await api('/api/jobs');
      jobsEl.innerHTML = '';
      for (const job of jobs) {
        const row = document.createElement('div');
        row.className = 'cursor-pointer rounded-lg border border-slate-200 bg-slate-50 p-2 transition hover:-translate-y-px hover:border-slate-300';
        row.innerHTML = `
          <div class="text-sm font-semibold text-slate-900">${escapeHTML(job.title || job.id)}</div>
          <div class="mt-1 text-xs text-slate-500">${job.status} · ${job.current_stage || '-'} · ${job.main_model}</div>
        `;
        row.onclick = () => selectJob(job.id);
        jobsEl.appendChild(row);
      }
    }

    async function selectJob(jobId) {
      if (selectedJob !== jobId) previousStageState = {};
      selectedJob = jobId;

      const job = await api(`/api/jobs/${jobId}`);
      jobMetaEl.textContent = `${job.id} · ${job.status} · ${job.current_stage || '-'} · ${job.main_model} @ ${job.main_model_base_url}`;
      renderStages(job);

      try {
        const transcript = await api(`/api/jobs/${jobId}/transcript`);
        if (transcript.ready === false) {
          transcriptEl.innerHTML = `<p class="rounded-lg border border-slate-200 bg-slate-50 p-3 text-sm text-slate-600">${escapeHTML(transcript.status === 'failed' ? `Transcript unavailable because job failed at stage: ${transcript.current_stage || 'unknown'}` : `Transcript not ready yet. Current stage: ${transcript.current_stage || 'unknown'}`)}</p>`;
        } else {
          renderTranscriptReady(transcript.transcript || '');
        }
      } catch (err) {
        transcriptEl.innerHTML = `<p class="rounded-lg border border-red-200 bg-red-50 p-3 text-sm text-red-700">Transcript unavailable: ${escapeHTML(err.message)}</p>`;
      }

      try {
        const blog = await api(`/api/jobs/${jobId}/blog`);
        if (blog.ready === false) {
          blogEl.innerHTML = `<p class="rounded-lg border border-slate-200 bg-slate-50 p-3 text-sm text-slate-600">${escapeHTML(blog.status === 'failed' ? `Blog unavailable because job failed at stage: ${blog.current_stage || 'unknown'}` : `Blog not ready yet. Current stage: ${blog.current_stage || 'unknown'}`)}</p>`;
        } else {
          renderMarkdownReady(blog.markdown || '');
        }
      } catch (err) {
        blogEl.innerHTML = `<p class="rounded-lg border border-red-200 bg-red-50 p-3 text-sm text-red-700">Blog unavailable: ${escapeHTML(err.message)}</p>`;
      }
    }

    async function createJob() {
      const sourceType = sourceTypeEl.value;
      const sourceValue = sourceValueEl.value.trim();
      const mainModel = mainModelEl.value.trim();

      const payload = { source_type: sourceType };
      if (sourceType === 'url') payload.source_url = sourceValue;
      if (sourceType === 'path') payload.source_path = sourceValue;
      if (mainModel !== '') payload.main_model = mainModel;

      const out = await api('/api/jobs', { method: 'POST', body: JSON.stringify(payload) });
      await loadJobs();
      await selectJob(out.job_id);
    }

    async function retrySelected() {
      if (!selectedJob) return;
      await api(`/api/jobs/${selectedJob}/retry`, { method: 'POST' });
      previousStageState = {};
      await loadJobs();
      await selectJob(selectedJob);
    }

    async function runGlobalSearch() {
      const q = globalSearchQEl.value.trim();
      if (q === '') {
        searchResultsEl.innerHTML = '';
        return;
      }

      searchResultsEl.innerHTML = '<p class="text-xs text-slate-500">Searching...</p>';
      const data = await api(`/api/search?q=${encodeURIComponent(q)}&limit=8`);
      renderSearchResults(data.results || []);
    }

    function renderSearchResults(results) {
      searchResultsEl.innerHTML = '';
      if (!results.length) {
        searchResultsEl.innerHTML = '<p class="text-xs text-slate-500">No matches yet.</p>';
        return;
      }

      for (const item of results) {
        const row = document.createElement('button');
        row.type = 'button';
        row.className = 'w-full rounded-lg border border-slate-200 bg-slate-50 p-2 text-left transition hover:border-slate-300';
        row.innerHTML = `
          <div class="flex items-center justify-between text-[11px] text-slate-500">
            <span>${escapeHTML((item.job_id || '').slice(0, 8))} · chunk ${escapeHTML(String(item.chunk_index ?? '-'))}</span>
            <span>score ${(item.score || 0).toFixed(3)}</span>
          </div>
          <div class="mt-1 text-xs font-semibold text-slate-800">${escapeHTML(item.job_title || 'Untitled Job')}</div>
          <div class="mt-1 text-xs text-slate-600">${escapeHTML(trimSnippet(item.content || ''))}</div>
        `;
        row.onclick = () => selectJob(item.job_id);
        searchResultsEl.appendChild(row);
      }
    }

    document.getElementById('submit').onclick = async () => {
      try { await createJob(); }
      catch (err) { alert(`Create job failed: ${err.message}`); }
    };

    document.getElementById('refresh').onclick = async () => {
      try {
        await loadJobs();
        if (selectedJob) await selectJob(selectedJob);
      } catch (err) {
        alert(`Refresh failed: ${err.message}`);
      }
    };

    document.getElementById('retry').onclick = async () => {
      try { await retrySelected(); }
      catch (err) { alert(`Retry failed: ${err.message}`); }
    };

    transcriptToggleEl.onclick = () => {
      transcriptOpen = !transcriptOpen;
      renderCollapsibles();
    };

    blogToggleEl.onclick = () => {
      blogOpen = !blogOpen;
      renderCollapsibles();
    };

    globalSearchBtnEl.onclick = async () => {
      try { await runGlobalSearch(); }
      catch (err) { searchResultsEl.textContent = `Search failed: ${err.message}`; }
    };

    globalSearchQEl.addEventListener('keydown', async (event) => {
      if (event.key !== 'Enter') return;
      event.preventDefault();
      try { await runGlobalSearch(); }
      catch (err) { searchResultsEl.textContent = `Search failed: ${err.message}`; }
    });

    loadJobs().catch(err => {
      jobsEl.textContent = `Failed to load jobs: ${err.message}`;
    });

    renderCollapsibles();

    setInterval(async () => {
      try {
        await loadJobs();
        if (selectedJob) await selectJob(selectedJob);
      } catch (_) {}
    }, 8000);
  </script>
</body>
</html>

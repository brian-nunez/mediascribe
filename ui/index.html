<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Video to Blog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,500;6..72,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f8f6;
      --surface: #ffffff;
      --text: #18181b;
      --muted: #6b7280;
      --line: #e5e7eb;
      --soft: #f3f4f6;
    }
    body {
      background: radial-gradient(1200px 500px at 85% -10%, #f0fdf4 0%, transparent 60%), var(--bg);
      color: var(--text);
      font-family: 'Manrope', ui-sans-serif, system-ui, -apple-system, sans-serif;
    }
    .brand { font-family: 'Newsreader', Georgia, serif; }
    mark {
      background: #fde68a;
      border-radius: 0.2rem;
      padding: 0 0.12rem;
    }
  </style>
</head>
<body>
  <header class="sticky top-0 z-40 border-b border-[var(--line)] bg-[var(--surface)]/95 backdrop-blur">
    <div class="mx-auto flex w-[96%] max-w-[1300px] items-center gap-3 py-3">
      <a href="/" class="brand text-[2rem] leading-none tracking-tight">Video to Blog</a>

      <div class="relative min-w-0 flex-1">
        <div class="flex items-center rounded-full border border-[var(--line)] bg-[var(--soft)] px-3 py-2 transition focus-within:border-slate-400">
          <span class="mr-2 text-sm text-slate-500">⌕</span>
          <input id="search_input" class="w-full bg-transparent text-sm text-slate-800 placeholder:text-slate-500 focus:outline-none" placeholder="Search technical topics and concepts" />
        </div>
        <div id="search_dropdown" class="absolute left-0 right-0 top-12 hidden max-h-[360px] overflow-auto rounded-xl border border-[var(--line)] bg-white p-2 shadow-2xl"></div>
      </div>

      <a href="/admin" class="rounded-full border border-[var(--line)] px-3 py-1.5 text-sm font-semibold text-slate-700 transition hover:bg-slate-100">Admin</a>
    </div>
  </header>

  <main class="mx-auto w-[96%] max-w-[1300px] py-4">
    <div class="grid gap-4 lg:grid-cols-[240px,1fr]">
      <aside class="h-fit rounded-2xl border border-[var(--line)] bg-white p-3 lg:sticky lg:top-[78px]">
        <p class="px-2 text-[11px] font-bold uppercase tracking-[0.12em] text-slate-500">Sections</p>
        <div class="mt-2 rounded-lg border border-slate-200 bg-slate-50 px-2 py-1.5">
          <input id="section_search" class="w-full bg-transparent text-xs text-slate-700 placeholder:text-slate-500 focus:outline-none" placeholder="Filter sections..." />
        </div>
        <div id="section_list" class="mt-2 space-y-1"></div>
      </aside>

      <section class="rounded-2xl border border-[var(--line)] bg-white p-2 sm:p-3">
        <div class="border-b border-[var(--line)] px-2 pb-3 pt-1">
          <h1 class="brand text-[1.6rem] leading-tight">Technical Blog Feed</h1>
          <p id="feed_meta" class="mt-1 text-xs text-slate-500">Loading…</p>
        </div>
        <div id="feed" class="divide-y divide-[var(--line)]"></div>
      </section>
    </div>
  </main>

  <script>
    const sectionListEl = document.getElementById('section_list');
    const sectionSearchEl = document.getElementById('section_search');
    const feedEl = document.getElementById('feed');
    const feedMetaEl = document.getElementById('feed_meta');
    const searchInputEl = document.getElementById('search_input');
    const searchDropdownEl = document.getElementById('search_dropdown');

    const state = {
      sections: [{ id: 'all', name: 'All', count: 0 }],
      items: [],
      selectedSection: 'all',
      query: '',
      searchResults: [],
      searchMap: new Map(),
      searchTimer: null,
      searchOpen: false,
      offset: 0,
      limit: 20,
      total: 0,
      hasMore: true,
      loading: false,
      sectionFilter: '',
    };

    function escapeHTML(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeRegExp(value) {
      return String(value || '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function dateLabel(value) {
      const d = new Date(value || 0);
      if (Number.isNaN(d.getTime())) return '';
      return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function timeLabel(total) {
      const n = Number(total || 0);
      if (!Number.isFinite(n) || n < 0) return '--:--';
      const sec = Math.floor(n);
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function sourceDomain(source) {
      if (!source) return 'no source';
      if (/^https?:\/\//i.test(source)) {
        try { return new URL(source).hostname.replace(/^www\./, ''); }
        catch (_) { return source; }
      }
      return 'local path';
    }

    function highlight(text, query) {
      const q = String(query || '').trim();
      if (!q) return escapeHTML(text);
      const terms = q.split(/\s+/).filter(x => x.length > 1).slice(0, 8);
      if (!terms.length) return escapeHTML(text);
      const pattern = terms.map(escapeRegExp).join('|');
      if (!pattern) return escapeHTML(text);
      return escapeHTML(text).replace(new RegExp(`(${pattern})`, 'ig'), '<mark>$1</mark>');
    }

    function sectionButton(section, active) {
      return `<button data-section="${escapeHTML(section.id)}" class="w-full rounded-lg px-2.5 py-2 text-left text-sm transition ${active ? 'bg-slate-900 text-white' : 'text-slate-700 hover:bg-slate-100'}">
        <span>${escapeHTML(section.name)}</span>
        <span class="ml-1 text-xs ${active ? 'text-slate-200' : 'text-slate-500'}">(${Number(section.count || 0)})</span>
      </button>`;
    }

    function renderSections() {
      const visible = state.sections.filter(s => s.id === 'all' || s.count > 0);
      const q = state.sectionFilter.trim().toLowerCase();
      const filtered = visible.filter(s => s.id === 'all' || !q || s.name.toLowerCase().includes(q));
      sectionListEl.innerHTML = filtered.map(section => sectionButton(section, section.id === state.selectedSection)).join('');
      sectionListEl.querySelectorAll('[data-section]').forEach(btn => {
        btn.onclick = async () => {
          state.selectedSection = btn.getAttribute('data-section') || 'all';
          renderSections();
          await resetAndLoadFeed();
        };
      });
    }

    function blogURL(blog) {
      return `/blog/${encodeURIComponent(blog.id)}?lang=en`;
    }

    function matchSummary(blog) {
      const entries = state.searchMap.get(blog.job_id) || [];
      if (!entries.length) return '';
      const top = entries[0];
      return `Match in chunk ${top.chunk_index} (${timeLabel(top.start_time_seconds)}-${timeLabel(top.end_time_seconds)})`;
    }

    function visibleBlogs() {
      return state.items;
    }

    function renderFeed() {
      const blogs = visibleBlogs();
      feedEl.innerHTML = '';
      if (!blogs.length) {
        feedMetaEl.textContent = state.loading ? 'Loading…' : 'No blogs for this filter.';
        feedEl.innerHTML = '<div class="px-3 py-8 text-sm text-slate-500">Try another section or clear search.</div>';
        return;
      }

      feedMetaEl.textContent = `${blogs.length} of ${state.total} blog${state.total === 1 ? '' : 's'}`;

      for (const blog of blogs) {
        const source = blog.source_url || blog.source_path || '';
        const row = document.createElement('a');
        row.href = blogURL(blog);
        row.className = 'group block w-full px-2 py-4 text-left transition hover:bg-slate-50';
        row.innerHTML = `
          <div class="flex items-start justify-between gap-2 text-[11px] text-slate-500">
            <span class="rounded bg-slate-100 px-2 py-0.5 uppercase tracking-wide">${escapeHTML(blog.section_name || 'Unsectioned')}</span>
            <span>${escapeHTML(dateLabel(blog.updated_at))}</span>
          </div>
          <h3 class="mt-2 text-[1.28rem] font-extrabold leading-snug text-slate-900 transition group-hover:text-slate-700">${escapeHTML(blog.title || 'Untitled')}</h3>
          <p class="mt-2 text-sm leading-relaxed text-slate-600">${escapeHTML(blog.preview || '')}</p>
          <div class="mt-2 flex flex-wrap items-center gap-1.5 text-[11px] text-slate-500">
            <span>${escapeHTML(sourceDomain(source))}</span>
            <span>•</span>
            <span>${(blog.languages || []).length} language${(blog.languages || []).length === 1 ? '' : 's'}</span>
          </div>
        `;
        feedEl.appendChild(row);
      }

      if (state.loading) {
        const loading = document.createElement('div');
        loading.className = 'px-3 py-4 text-xs text-slate-500';
        loading.textContent = 'Loading more…';
        feedEl.appendChild(loading);
      }
    }

    async function loadFeedPage() {
      if (state.loading || !state.hasMore) return;
      state.loading = true;
      renderFeed();
      const params = new URLSearchParams();
      params.set('limit', String(state.limit));
      params.set('offset', String(state.offset));
      if (state.selectedSection !== 'all') params.set('section_id', state.selectedSection);
      const res = await fetch(`/api/public/feed?${params.toString()}`);
      if (!res.ok) throw new Error(await res.text() || `HTTP ${res.status}`);
      const page = await res.json();

      state.sections = [{ id: 'all', name: 'All', count: Number(page.total || 0) }].concat(
        (Array.isArray(page.sections) ? page.sections : []).map(s => ({ id: s.id || '', name: s.name || 'Section', count: Number(s.count || 0) }))
      );
      state.items = state.items.concat(Array.isArray(page.items) ? page.items : []);
      state.offset = Number(page.next_offset || state.items.length);
      state.total = Number(page.total || state.total);
      state.hasMore = Boolean(page.has_more);
      state.loading = false;
      renderSections();
      renderFeed();
    }

    async function resetAndLoadFeed() {
      state.items = [];
      state.offset = 0;
      state.total = 0;
      state.hasMore = true;
      state.loading = false;
      renderFeed();
      await loadFeedPage();
    }

    function searchSnippet(content) {
      const text = String(content || '').replace(/\s+/g, ' ').trim();
      if (text.length <= 170) return text;
      return `${text.slice(0, 170)}...`;
    }

    function renderSearchDropdown() {
      searchDropdownEl.innerHTML = '';
      if (!state.searchOpen || !state.query.trim()) {
        searchDropdownEl.classList.add('hidden');
        return;
      }

      if (!state.searchResults.length) {
        searchDropdownEl.classList.remove('hidden');
        searchDropdownEl.innerHTML = '<p class="px-2 py-3 text-sm text-slate-500">No relevant matches found.</p>';
        return;
      }

      searchDropdownEl.classList.remove('hidden');
      for (const item of state.searchResults) {
        const linkedBlog = state.items.find(b => b.job_id === item.job_id);
        if (!linkedBlog) continue;
        const blogHref = linkedBlog
          ? `/blog/${encodeURIComponent(linkedBlog.id)}?lang=en&chunk=${encodeURIComponent(item.chunk_index)}&q=${encodeURIComponent(state.query.trim())}`
          : '#';
        const row = document.createElement('a');
        row.href = blogHref;
        row.className = 'block rounded-lg px-2 py-2 text-sm hover:bg-slate-100';
        row.innerHTML = `
          <div class="flex items-center justify-between gap-2">
            <p class="font-semibold text-slate-800">${highlight(linkedBlog.title || 'Untitled', state.query)}</p>
            <span class="text-[10px] uppercase tracking-wide text-slate-500">${escapeHTML(linkedBlog.section_name || 'Unsectioned')}</span>
          </div>
          <p class="mt-1 text-xs text-slate-600">${highlight(searchSnippet(linkedBlog.preview || ''), state.query)}</p>
          <p class="mt-1 text-[11px] text-slate-500">Best transcript match at ${timeLabel(item.start_time_seconds)}-${timeLabel(item.end_time_seconds)}</p>
        `;
        searchDropdownEl.appendChild(row);
      }
      if (!searchDropdownEl.children.length) {
        searchDropdownEl.innerHTML = '<p class="px-2 py-3 text-sm text-slate-500">No loaded blog matches yet. Scroll feed to load more blogs.</p>';
      }
    }

    async function runSearch(query) {
      const q = String(query || '').trim();
      if (!q) {
        state.searchResults = [];
        state.searchMap.clear();
        renderSearchDropdown();
        renderFeed();
        return;
      }
      const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&limit=20`);
      if (!res.ok) throw new Error(await res.text() || `HTTP ${res.status}`);
      const payload = await res.json();
      const raw = Array.isArray(payload.results) ? payload.results : [];
      const terms = q.toLowerCase().split(/\s+/).filter(Boolean);
      const mapped = raw
        .map(item => ({ ...item, blog_id: item.blog_id || '' }))
        .filter(item => {
          if (!terms.length) return true;
          const hay = `${String(item.job_title || '').toLowerCase()} ${String(item.content || '').toLowerCase()}`;
          return terms.some(t => hay.includes(t));
        });
      const bestByJob = new Map();
      for (const item of mapped) {
        if (!item.job_id) continue;
        const prev = bestByJob.get(item.job_id);
        if (!prev || Number(item.score || 0) > Number(prev.score || 0)) {
          bestByJob.set(item.job_id, item);
        }
      }
      state.searchResults = Array.from(bestByJob.values()).sort((a, b) => Number(b.score || 0) - Number(a.score || 0));
      state.searchMap.clear();
      for (const item of state.searchResults) {
        if (!item.job_id) continue;
        state.searchMap.set(item.job_id, [item]);
      }
      renderSearchDropdown();
      renderFeed();
    }

    async function boot() {
      await resetAndLoadFeed();

      const sentinel = document.createElement('div');
      sentinel.className = 'h-8';
      feedEl.parentElement.appendChild(sentinel);
      const io = new IntersectionObserver(async (entries) => {
        for (const e of entries) {
          if (e.isIntersecting && state.hasMore && !state.loading) {
            try { await loadFeedPage(); } catch (_) {}
          }
        }
      }, { rootMargin: '300px 0px 300px 0px' });
      io.observe(sentinel);

      searchInputEl.addEventListener('focus', () => {
        state.searchOpen = true;
        renderSearchDropdown();
      });
      searchInputEl.addEventListener('blur', () => {
        setTimeout(() => {
          state.searchOpen = false;
          renderSearchDropdown();
        }, 120);
      });
      searchInputEl.addEventListener('input', () => {
        state.query = searchInputEl.value;
        if (state.searchTimer) clearTimeout(state.searchTimer);
        state.searchTimer = setTimeout(async () => {
          try {
            await runSearch(state.query);
          } catch (_) {
            state.searchResults = [];
            state.searchMap.clear();
            renderSearchDropdown();
            renderFeed();
          }
        }, 250);
      });
      sectionSearchEl.addEventListener('input', () => {
        state.sectionFilter = sectionSearchEl.value || '';
        renderSections();
      });
    }

    boot();
  </script>
</body>
</html>
